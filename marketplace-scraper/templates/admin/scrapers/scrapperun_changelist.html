{% extends "admin/change_list.html" %}
{% load static %}

{% block object-tools-items %}
  <!-- Кнопки ручного запуска -->
  <li>
    <a href="{% url run_ozon_url %}" 
       class="button" 
       style="background: #3498db; border: none;"
       onclick="return confirm('🚀 Запустить парсер Ozon сейчас?\n\n⚠️ Запуск может занять 2-5 минут.\nСтатус обновится в списке ниже.')">
       🟠 Запустить Ozon
    </a>
  </li>
  <li>
    <a href="{% url run_wb_url %}" 
       class="button" 
       style="background: #27ae60; border: none;"
       onclick="return confirm('🚀 Запустить парсер Wildberries сейчас?\n\n⚠️ Запуск может занять 2-5 минут.\nСтатус обновится в списке ниже.')">
       🟢 Запустить WB
    </a>
  </li>
  
  {{ block.super }}
{% endblock %}

{% block messages %}
  {{ block.super }}
  {% if messages %}
  <script>
    // Авто-обновление страницы через 30 сек, если запущен парсер
    const running = document.querySelectorAll('.field-status_badge').length > 0;
    if (running) {
      setTimeout(() => location.reload(), 30000);
    }
  </script>
  {% endif %}
{% endblock %}
